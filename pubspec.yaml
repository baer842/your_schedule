name: your_schedule
description: Filter your Untis Schedule by classes you have chosen.

version: 1.5.2+1502

environment:
  sdk: '>=3.11.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.6.0
  logger: ^2.7.0
  flutter_material_color_picker: ^1.2.0
  flutter_riverpod: ^3.3.1
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.5.5
  google_fonts: ^8.0.2
  intl: ^0.20.2
  flutter_native_splash: ^2.4.7
  sentry_flutter: ^9.16.1
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0
  otp: ^3.2.0
  riverpod_annotation: ^4.0.2
  dart_extensions_methods: ^2.0.0
  connectivity_plus: ^7.1.1
  animations: ^2.1.2
  flutter_local_notifications: ^20.1.0
  workmanager: ^0.9.0+3
  permission_handler: ^12.0.1
  qr_code_scanner_plus: ^2.1.1
  vibration: ^3.1.8

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  build_runner: ^2.13.1
  freezed: ^3.2.5
  json_serializable: ^6.13.0
  riverpod_generator: ^4.0.3
  riverpod_lint: ^3.1.3
  #freezed_lint: ^0.0.10

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/school_padding.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/school_padding.png"

flutter_native_splash:
  color: "#FFFFFF"
  image: "assets/school_padding.png"
  android: true
  ios: false

flutter:
  uses-material-design: true
  assets:
    - assets/school_padding.png
    - assets/school_blue.png